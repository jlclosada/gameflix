# Render Blueprint for the GameTier app.
# Deploys: Node API on Render.
# The PostgreSQL database is hosted for free on Supabase (no expiry).
# The React frontend is deployed separately on Netlify (see netlify.toml).
# Docs: https://render.com/docs/blueprint-spec

services:
  # Backend API
  - type: web
    name: tierlist-api
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    # Creates tables (idempotent, IF NOT EXISTS) on every boot, then starts.
    # Done in startCommand so it also works on Render's free tier, where
    # preDeployCommand is not available.
    startCommand: npm run init-db && npm start
    healthCheckPath: /api/health
    envVars:
      # Paste your Supabase connection string here in the Render dashboard.
      # Supabase -> Project Settings -> Database -> Connection string (URI).
      # Use the "Session pooler" / port 5432 URI.
      - key: DATABASE_URL
        sync: false
      - key: PGSSL
        value: 'true'
      # Secret used to sign user session tokens (JWT).
      # Render generates a strong random value automatically.
      - key: JWT_SECRET
        generateValue: true
      # Set this to your Netlify site URL once deployed, e.g.
      # https://gameflix.netlify.app  (comma-separated for multiple origins).
      - key: CORS_ORIGIN
        value: '*'
      - key: NODE_VERSION
        value: '20'
