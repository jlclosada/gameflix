# Render Blueprint for the GameTier app.
# Deploys: Node API + static React frontend on Render.
# The PostgreSQL database is hosted for free on Supabase (no expiry).
# Docs: https://render.com/docs/blueprint-spec

services:
  # Backend API
  - type: web
    name: tierlist-api
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    # Creates tables (idempotent, IF NOT EXISTS) on every boot, then starts.
    # Done in startCommand so it also works on Render's free tier, where
    # preDeployCommand is not available.
    startCommand: npm run init-db && npm start
    healthCheckPath: /api/health
    envVars:
      # Paste your Supabase connection string here in the Render dashboard.
      # Supabase -> Project Settings -> Database -> Connection string (URI).
      # Use the "Session pooler" / port 5432 URI.
      - key: DATABASE_URL
        sync: false
      - key: PGSSL
        value: 'true'
      - key: CORS_ORIGIN
        value: '*'
      - key: NODE_VERSION
        value: '20'

  # Frontend static site
  - type: web
    name: tierlist-web
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      # After the first deploy, set this to the real API URL, e.g.
      # https://tierlist-api.onrender.com
      - key: VITE_API_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
