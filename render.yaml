# Render Blueprint for the GameTier app.
# Deploys: PostgreSQL database + Node API + static React frontend.
# Docs: https://render.com/docs/blueprint-spec

databases:
  - name: tierlist-db
    plan: free
    databaseName: tierlist
    user: tierlist

services:
  # Backend API
  - type: web
    name: tierlist-api
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    # Creates tables (idempotent, IF NOT EXISTS) on every boot, then starts.
    # Done in startCommand so it also works on Render's free tier, where
    # preDeployCommand is not available.
    startCommand: npm run init-db && npm start
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: tierlist-db
          property: connectionString
      - key: PGSSL
        value: 'true'
      - key: CORS_ORIGIN
        value: '*'
      - key: NODE_VERSION
        value: '20'

  # Frontend static site
  - type: web
    name: tierlist-web
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      # After the first deploy, set this to the real API URL, e.g.
      # https://tierlist-api.onrender.com
      - key: VITE_API_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
